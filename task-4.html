<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TrendHive</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
scroll-behavior:smooth;
transition:.3s;
}

body{

background:linear-gradient(
135deg,
#ff9a9e,
#fad0c4,
#fbc2eb,
#a6c1ee
);

min-height:100vh;
overflow-x:hidden;

}


/* NAVBAR */

.navbar{

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 40px;

background:rgba(255,255,255,.2);

backdrop-filter:blur(20px);

box-shadow:0 8px 32px rgba(0,0,0,.1);

position:sticky;
top:0;
z-index:100;

}


.logo{

font-size:35px;
font-weight:bold;

background:linear-gradient(
45deg,
#ff006e,
#8338ec,
#3a86ff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}


input{

padding:15px;

width:300px;

border:none;
outline:none;

border-radius:30px;

box-shadow:
0 5px 15px rgba(0,0,0,.1);

}


/* HERO */

.hero{

height:400px;

margin:30px;

border-radius:30px;


background:

linear-gradient(
135deg,
rgba(255,0,150,.7),
rgba(0,204,255,.7)
),

url('https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=1200');

background-size:cover;
background-position:center;


display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;

color:white;

box-shadow:
0 20px 50px rgba(0,0,0,.3);

}



.hero h1{

font-size:60px;

}


.hero p{

font-size:24px;

margin-top:10px;

}



/* PRODUCTS */

#products{


display:grid;

grid-template-columns:
repeat(auto-fit,minmax(270px,1fr));


gap:30px;


padding:30px;


}




.card{


background:white;

padding:20px;


border-radius:25px;


text-align:center;


position:relative;


overflow:hidden;



box-shadow:
0 10px 30px rgba(0,0,0,.1);


}


.card:hover{


transform:
translateY(-10px);


box-shadow:
0 20px 40px rgba(0,0,0,.2);

}


.card img{


width:100%;
height:220px;

object-fit:cover;

border-radius:20px;

}



.badge{


position:absolute;

top:15px;
left:15px;


padding:7px 15px;


border-radius:30px;


background:

linear-gradient(
45deg,
#ff416c,
#ff4b2b
);

color:white;

font-size:14px;

}



.rating{

color:orange;

font-size:18px;

margin-top:10px;

}



.price{


font-size:24px;
font-weight:bold;

margin-top:10px;

}


.old{

text-decoration:line-through;

color:gray;

font-size:15px;

}


button{

margin-top:15px;

padding:14px;


border:none;


border-radius:30px;


width:100%;


font-size:16px;


font-weight:bold;



background:


linear-gradient(

45deg,

#00c9ff,

#92fe9d

);


color:white;


cursor:pointer;

}



button:hover{

transform:scale(1.03);

}



/* TOAST */

#toast{


position:fixed;


bottom:30px;


right:30px;



padding:15px 30px;



border-radius:30px;



background:


linear-gradient(

45deg,

#11998e,

#38ef7d

);



color:white;


display:none;


font-weight:bold;


z-index:999;


}




/* BUBBLES */

.bubbles{

position:fixed;

width:100%;
height:100%;

overflow:hidden;

z-index:-1;

}


.bubbles span{


position:absolute;


bottom:-150px;


background:
rgba(255,255,255,.3);


border-radius:50%;


animation:
animate 15s linear infinite;


}



.bubbles span:nth-child(1){
left:10%;
width:80px;
height:80px;
animation-duration:10s;
}

.bubbles span:nth-child(2){
left:30%;
width:40px;
height:40px;
animation-duration:15s;
}

.bubbles span:nth-child(3){
left:50%;
width:60px;
height:60px;
animation-duration:18s;
}

.bubbles span:nth-child(4){
left:70%;
width:50px;
height:50px;
animation-duration:12s;
}

.bubbles span:nth-child(5){
left:90%;
width:90px;
height:90px;
animation-duration:20s;
}


@keyframes animate{

0%{

transform:translateY(0);
opacity:1;

}

100%{

transform:translateY(-1200px);
opacity:0;

}

}

</style>


</head>


<body>



<div class="bubbles">

<span></span>
<span></span>
<span></span>
<span></span>
<span></span>

</div>




<nav class="navbar">

<h1 class="logo">
TrendHive
</h1>


<input
id="search"
placeholder="Search Product">

</nav>




<section class="hero">

<h1>TrendHive</h1>

<p>
Discover Trending Products
</p>

</section>




<div id="products"></div>



<div id="toast">
Added to Cart
</div>





<script>

const products=[

{

id:1,

name:"Nike Air Max",

price:4999,

oldPrice:6999,

rating:4.8,

category:"Shoes",

image:"https://picsum.photos/300?1"

},

{

id:2,

name:"Boat Headphones",

price:1999,

oldPrice:2999,

rating:4.5,

category:"Electronics",

image:"https://picsum.photos/300?2"

},

{

id:3,

name:"Lip Serum",

price:899,

oldPrice:1200,

rating:4.7,

category:"Beauty",

image:"https://picsum.photos/300?3"

}

];



const container=
document.getElementById("products");



function render(data){

container.innerHTML="";


data.forEach(product=>{


container.innerHTML+=`


<div class="card">


<div class="badge">

${product.category}

</div>



<img src="${product.image}">


<h2>

${product.name}

</h2>



<div class="rating">

⭐ ${product.rating}

</div>



<p class="price">

₹${product.price}

</p>



<p class="old">

₹${product.oldPrice}

</p>



<button onclick="showToast()">

Add Cart

</button>



</div>

`;

});

}



render(products);



document
.getElementById("search")

.addEventListener("input",e=>{


const value=
e.target.value.toLowerCase();


const filtered=products.filter(p=>

p.name.toLowerCase()
.includes(value)

);


render(filtered);


});



function showToast(){

let toast=
document.getElementById("toast");


toast.style.display="block";


setTimeout(()=>{

toast.style.display="none";

},2000);

}


</script>

</body>
</html>
